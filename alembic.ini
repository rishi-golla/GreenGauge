# Alembic configuration file.
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the alembic migrations directory
script_location = alembic

# Template for new migration file names: timestamp + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the timestamp in file names
timezone = UTC

# Max length of the slug part of the file name
truncate_slug_length = 40

# SQLAlchemy connection URL — overridden in env.py from settings
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/greengauge

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
